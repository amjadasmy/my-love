<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You 💌</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="scene">

  <!-- Mail Box -->
  <div class="envelope" onclick="openLetter()">
    <div class="flap"></div>
    <div class="body"></div>
    <div class="letter">
      <h2>💌 A Message for You</h2>
      <p class="insta">Instagram: <b>Blurb.3rry</b></p>
      <p class="msg">
        I love you.<br><br>
        I will never let you down in your lowest moments.<br>
        I will stay beside you, support you, and care for you always.<br><br>
        You are special to me in ways words cannot explain.<br><br>
        💖 This is not just a feeling… it is a promise.
      </p>
    </div>
  </div>

  <!-- Effects -->
  <div id="hearts"></div>
  <div id="butterflies"></div>
  <div id="boom"></div>

</div>

<script src="script.js"></script>
</body>
</html>
